<!DOCTYPE html>
<html lang="zh-TW" translate="no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<div style="
display:flex;
gap:10px;
margin-bottom:25px;
position:sticky;
top:0;
z-index:999;
background:#0b1f2a;
padding:15px 0;
">

    <a href="/" style="
       background:#17c1d6;
       color:white;
       padding:10px 18px;
       border-radius:8px;
       text-decoration:none;
       font-weight:bold;">
        🏠 回首頁
    </a>

    <a href="/shop" style="
       background:#1f8f5f;
       color:white;
       padding:10px 18px;
       border-radius:8px;
       text-decoration:none;
       font-weight:bold;">
        🛒 回商城
    </a>

</div>

<head>    

    <style>
        body {
            font-family: Arial;
            background: #0b1f2a;
            color: white;
            padding: 10px;
        }

        /* 新增商品區 */
        .card {
            background: #12343b;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            max-width: 95%;
            box-sizing: border-box;
            margin: 0 auto;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00bcd4;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* 商品列表 */
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* 商品卡片 */
        .product-card {
            width: 160px;
            background: #0f2e35;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        /* 圖片 */
        .main-img {
            width: 145px;
            height: 145px;
            object-fit: cover;
            border-radius: 8px;
        }

        .thumb-row img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 5px;
            margin: 5px 2px;
            opacity: 0.7;
        }

        .thumb-row img:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* 文字 */
        .name {
            font-weight: bold;
        }

        .price {
            color: #00eaff;
        }

        .stock {
            color: #8bc34a;
        }

        .sold {
            color: red;
        }

        /* 按鈕 */
        .actions {
            margin-top: 10px;
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn {
            padding: 5px 8px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 12px;
        }

        .edit {
            background: #00c8ff;
        }

        .delete {
            background: #ff4d4d;
        }

        @media (max-width:768px){

        .products{
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            gap:10px;
        }

        .product-card{
            width:48%;
            box-sizing:border-box;
        }

        .main-img{
            width:100%;
            height:140px;
            object-fit:cover;
        }        

        body{
            padding:10px;
        }

        .card{
            width:100%;
            max-width:100%;
            margin:0 auto;
            box-sizing:border-box;
        } 
    }
  
    </style>

</head>

<body>

    <h2 style="text-align:center;">
        📦 商品管理
    </h2>

    <div class="card">
        <form method="POST">

            <label>商品名稱</label>
            <input name="name" required>

            <label>庫存</label>
            <input name="stock" type="number" required>

            <label>價格</label>
            <input name="price" type="number" required>

            <label>商品分類</label>
            <select name="category_id" required>

                <option value="1">食品區</option>

                <option value="2">飾品區</option>

                <option value="3">祭祀區</option>

            </select>

            <label>主圖</label>
            <input name="image1" required>

            <label>副圖</label>
            <input name="image2">

            <label>商品說明</label>
            <textarea name="description"></textarea>

            <button>＋ 新增商品</button>

        </form>
    </div>

    <hr>

    <h3>📋 現有商品</h3>

    <div class="products">

        {% for p in products %}
        <div class="product-card {% if p.stock == 0 %}sold-out{% endif %}">

            <!-- 主圖 -->
            <img class="main-img" src="{{ p.image1 or '/static/default.jpg' }}">

            <!-- 縮圖 -->
            <div class="thumb-row">
                <img src="{{ p.image1 }}">
                {% if p.image2 %}
                <img src="{{ p.image2 }}">
                {% endif %}
            </div>

            <!-- 資訊 -->
            <div class="name">{{ p.name }}</div>
            <div class="price">NT$ {{ p.price }}</div>

            {% if p.stock > 0 %}
            <div class="stock">庫存：{{ p.stock }}</div>
            {% else %}
            <div class="sold">已售完</div>
            {% endif %}

            <!-- 按鈕 -->
            <div class="actions">
                <a href="/edit_product/{{ p.id }}" class="btn edit">編輯</a>
                <form method="POST" action="/delete_product/{{ p.id }}" onsubmit="return confirm('確定刪除？')"
                    style="display:inline;">
                    <button type="submit" class="btn delete">刪除</button>
                </form>

                <!-- 🔥 上架 / 下架 -->
                <br>
                {% if p.status == 1 %}
                <form method="POST" action="/toggle_product/{{ p.id }}/0" style="display:inline;">
                    <button type="submit" class="btn" style="background:red;">下架</button>
                </form>
                {% else %}
                <form method="POST" action="/toggle_product/{{ p.id }}/1" style="display:inline;">
                    <button type="submit" class="btn" style="background:lime;">上架</button>
                </form>
                {% endif %}
            </div>

        </div>
        {% endfor %}

    </div>    

</body>

</div>

</html>
