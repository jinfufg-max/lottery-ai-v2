<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排行榜</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #071b26, #0b2c3d);
    color:white;
    text-align:center;
}

.container {
    margin-top:50px;
}

.card {
    background:#102f40;
    margin:15px auto;
    padding:20px;
    width:320px;
    border-radius:12px;
}

.top1 { border-left:5px solid gold; }
.top2 { border-left:5px solid silver; }
.top3 { border-left:5px solid #cd7f32; }

.footer {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<h1>🏆 AI排行榜</h1>

<div class="container">

{% if ranking %}
    {% for r in ranking %}
    <div class="card
        {% if loop.index == 1 %}top1
        {% elif loop.index == 2 %}top2
        {% elif loop.index == 3 %}top3
        {% endif %}
    ">
        <p>🏅 第 {{ loop.index }} 名</p>
        <p>{{ r.nums }}</p>
        <p>命中：{{ r.match }} 個</p>
    </div>
    {% endfor %}
{% else %}
    <p>⚠️ 尚無資料</p>
{% endif %}

<br>
<a href="/">🏠 回首頁</a>

</div>

<div class="footer">
⚠️ 本系統為AI模擬分析，僅供參考
</div>

</body>
</html>
