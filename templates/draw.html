<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>輸入開獎號碼</title>

    <style>
        body {
            background: #0b1d2a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 50px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00c853;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #4fc3f7;
        }
    </style>
</head>

<body>

    <h1>🎯 輸入開獎號碼</h1>

    <form method="POST">
        <input type="text" name="numbers" placeholder="例如：1,2,3,4,5,6">
        <br>
        <button type="submit">儲存開獎號碼</button>
    </form>

    <a href="/">返回首頁</a>

</body>
</html>
