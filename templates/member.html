<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>會員註冊</title>

    <style>
        body {

            margin: 0;

            background: #071d29;

            font-family: Arial, sans-serif;

            color: white;
        }

        .member-page {

            width: 100%;

            max-width: 480px;

            margin: 0 auto;

            padding: 15px;

            box-sizing: border-box;
        }

        .back-home {

            display: inline-block;

            color: #FFD700;

            text-decoration: none;

            font-weight: bold;

            margin-bottom: 15px;

            font-size: 18px;
        }

        .member-card {

            background: #0b2d3d;

            border-radius: 20px;

            padding: 35px 22px;

            text-align: center;

            box-shadow: 0 0 25px rgba(0, 255, 255, 0.08);
        }

        .member-title {

            font-size: 34px;

            margin-bottom: 15px;
        }

        .member-price {

            font-size: 35px;

            color: #00eaff;

            font-weight: bold;

            margin-bottom: 15px;

            text-shadow: 0 0 12px rgba(0, 234, 255, 0.35);
        }

        .member-sub {

            color: #66f2ff;

            font-size: 18px;

            margin-bottom: 28px;
        }

        .pay-btn {

            display: block;

            width: 100%;

            box-sizing: border-box;

            padding: 18px;

            background: linear-gradient(45deg, #FFD700, #ffb300);

            border-radius: 14px;

            text-decoration: none;

            font-size: 22px;

            font-weight: bold;

            color: #000;

            margin-bottom: 35px;

            box-shadow: 0 0 16px rgba(255, 215, 0, 0.35);

            transition: 0.2s;
        }

        .pay-btn:hover {

            transform: scale(1.02);
        }

        .member-info {

            font-size: 17px;

            color: #ddd;

            line-height: 2;

            text-align: left;
        }

        .member-block {

            margin-bottom: 28px;
        }

        .member-block-title {

            color: #00eaff;

            font-size: 22px;

            font-weight: bold;

            margin-bottom: 10px;

            text-align: center;
        }

        .notice {

            margin-top: 30px;

            color: #ff8080;

            font-size: 18px;

            text-align: center;

            line-height: 1.8;
        }

        @media (max-width:768px) {

            .member-page {

                padding: 14px;
            }

            .member-card {

                padding: 28px 18px;
            }

            .member-title {

                font-size: 28px;
            }

            .member-price {

                font-size: 46px;
            }

            .member-sub {

                font-size: 16px;
            }

            .pay-btn {

                font-size: 20px;

                padding: 16px;
            }

            .member-info {

                font-size: 16px;
            }

            .member-block-title {

                font-size: 20px;
            }

        }
    </style>

</head>

<body>

    <div class="member-page">

        <a href="/" class="back-home">
            ← 回首頁
        </a>

        <div class="member-card">

            <h2 class="member-title">
                🎯 會員註冊費
            </h2>

            <div class="member-price">
                NT$100
            </div>

            <div class="member-sub">
                一次性註冊（限時體驗）
            </div>

            <a href="/ecpay" class="pay-btn">
                💳 前往付款（綠界）
            </a>

            <div class="member-info">

                <div class="member-block">

                    <div class="member-block-title">
                        🎁 註冊立即獲得
                    </div>

                    ✨準提金 150 點<br>
                    ➕大金袋 × 2


                </div>

                <div class="member-block">

                    <div class="member-block-title">
                        🤖 AI推薦
                    </div>

                    🤖會員： 5 次/天 🎯非會員：每日可免費使用 1 次

                </div>

                <div class="member-block">

                    <div class="member-block-title">
                        📊 AI說明
                    </div>

                    👑AI推薦為基礎分析模型，提供參考號碼；<br>
                    👑進階分析可透過福袋系統多種分析模型統計<br>

                </div>

            </div>

            <div class="notice">

                ※ 正式上線後將調整為 NT$199（含200準提金）

            </div>

        </div>

    </div>

</body>

</html>
