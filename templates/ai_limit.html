<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用限制</title>

<style>
body{
    background:#062b2f;
    color:#fff;
    text-align:center;
    font-family: Arial;
    padding-top:120px;
}

.card{
    width:420px;
    margin:auto;
    padding:40px;
    background:#082c30;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.title{
    font-size:24px;
    margin-bottom:20px;
    color:#FFD700;
}

.desc{
    margin-top:10px;
    color:#ccc;
}

.btn{
    margin-top:25px;
    padding:12px 25px;
    background:#FFD700;
    color:#000;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">
        今日免費次數已用完
    </div>

    <div class="desc">
        註冊會員即可無限使用 AI 推薦
    </div>

    <a href="/register">
    <button class="btn">立即註冊</button>
</a>

<a href="/">
    <button class="btn" style="background:#00c2d1;color:#000;margin-top:12px;">
        回首頁
    </button>
</a>

</div>

</body>
</html>
