<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員註冊</title>

    <style>
        body {
            background: #0b1f2a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 30px;
        }

        .home-btn a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: bold;
        }

        .card {
            background: #132f3f;
            padding: 40px;
            border-radius: 15px;
            width: 340px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff9800;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .price {
            color: #00ffcc;
            font-weight: bold;
            margin: 10px 0;
        }

        .bonus {
            color: #ffd700;
            font-weight: bold;
            margin: 10px 0;
        }

        .small {
            font-size: 13px;
            opacity: 0.85;
            line-height: 1.6;
        }

        .back-login {
            display: inline-block;
            margin-top: 18px;
            color: #00c6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="home-btn">
    <a href="/">← 回首頁</a>
</div>

<div class="card">
    <h2>會員註冊（限時體驗方案）</h2>

    <div class="price">限時體驗價：NT$100</div>

    <div class="bonus">
        🎁 註冊立即獲得<br>
        準提金 150 點 + 大金袋 ×1 + 大銀袋 ×2
    </div>

    <div class="small">
        ✔ 準提金僅限站內使用<br>
        ✔ 可使用準提金購買福袋<br>
        ✔ AI推薦號分析<br>
        ✔ 對獎紀錄與統計分析<br><br>

        🤖 AI推薦為基礎分析模型（統計參數較少），提供參考號碼<br>
        進階分析可透過福袋系統，結合更多數據提升命中機會<br><br>

        👤 使用規則：<br>
        會員免費使用<br>
        非會員每日可免費使用 1 次<br><br>

        ※ 正式上線後將調整為 NT$199（含 200 準提金）
    </div>

    <br>

    <form action="/payment-preview" method="get">
        <input type="text" name="username" placeholder="帳號" required>
        <input type="password" name="password" placeholder="密碼" required>

        <button type="submit">前往付款</button>
    </form>

    <a href="/login" class="back-login">← 返回登入</a>
</div>

</body>
</html>
